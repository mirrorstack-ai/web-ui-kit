name: Sync Project Status

on:
  pull_request:
    types: [opened, reopened, closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  set-in-review:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: mirrorstack-ai

      - name: Get linked issues
        id: issues
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";

            const regex = /(?:closes|fixes|resolves)\s+#(\d+)/gi;
            const issues = [];
            let match;
            while ((match = regex.exec(body)) !== null) {
              issues.push(parseInt(match[1]));
            }

            const unique = [...new Set(issues)];
            core.setOutput("numbers", JSON.stringify(unique));
            console.log(`Linked issues: ${unique.join(", ") || "none"}`);

      - name: Set issues to In Review
        if: steps.issues.outputs.numbers != '[]'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.bot-token.outputs.token }}
          script: |
            const issues = JSON.parse('${{ steps.issues.outputs.numbers }}');
            const ORG = "mirrorstack-ai";
            const PROJECT_NUMBER = 2;

            for (const issueNumber of issues) {
              const query = `
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      projectItems(first: 10) {
                        nodes {
                          id
                          project { number }
                        }
                      }
                    }
                  }
                }
              `;

              const result = await github.graphql(query, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                number: issueNumber,
              });

              const items = result.repository.issue.projectItems.nodes;
              const projectItem = items.find(i => i.project.number === PROJECT_NUMBER);

              if (!projectItem) {
                console.log(`Issue #${issueNumber} not in project ${PROJECT_NUMBER}`);
                continue;
              }

              const fieldQuery = `
                query($org: String!, $projectNumber: Int!) {
                  organization(login: $org) {
                    projectV2(number: $projectNumber) {
                      id
                      field(name: "Status") {
                        ... on ProjectV2SingleSelectField {
                          id
                          options { id name }
                        }
                      }
                    }
                  }
                }
              `;

              const fieldResult = await github.graphql(fieldQuery, {
                org: ORG,
                projectNumber: PROJECT_NUMBER,
              });

              const field = fieldResult.organization.projectV2.field;
              const inReviewOption = field.options.find(o => o.name === "In Review");

              if (!inReviewOption) {
                console.log("'In Review' status option not found");
                continue;
              }

              const mutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `;

              await github.graphql(mutation, {
                projectId: fieldResult.organization.projectV2.id,
                itemId: projectItem.id,
                fieldId: field.id,
                optionId: inReviewOption.id,
              });

              console.log(`Issue #${issueNumber} → In Review`);
            }

  set-target-date:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: mirrorstack-ai

      - name: Get linked issues
        id: issues
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const regex = /(?:closes|fixes|resolves)\s+#(\d+)/gi;
            const issues = [];
            let match;
            while ((match = regex.exec(body)) !== null) {
              issues.push(parseInt(match[1]));
            }
            const unique = [...new Set(issues)];
            core.setOutput("numbers", JSON.stringify(unique));
            console.log(`Linked issues: ${unique.join(", ") || "none"}`);

      - name: Set Target Date on linked issues
        if: steps.issues.outputs.numbers != '[]'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.bot-token.outputs.token }}
          script: |
            const issues = JSON.parse('${{ steps.issues.outputs.numbers }}');
            const ORG = "mirrorstack-ai";
            const PROJECT_NUMBER = 2;
            const today = new Date().toISOString().split("T")[0];

            for (const issueNumber of issues) {
              const result = await github.graphql(`
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      projectItems(first: 10) {
                        nodes { id project { number } }
                      }
                    }
                  }
                }
              `, { owner: context.repo.owner, repo: context.repo.repo, number: issueNumber });

              const items = result.repository.issue.projectItems.nodes;
              const projectItem = items.find(i => i.project.number === PROJECT_NUMBER);
              if (!projectItem) continue;

              const fieldResult = await github.graphql(`
                query($org: String!, $projectNumber: Int!) {
                  organization(login: $org) {
                    projectV2(number: $projectNumber) {
                      id
                      field(name: "Target Date") {
                        ... on ProjectV2Field { id }
                      }
                    }
                  }
                }
              `, { org: ORG, projectNumber: PROJECT_NUMBER });

              const project = fieldResult.organization.projectV2;

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: Date!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { date: $date }
                  }) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId: project.id,
                itemId: projectItem.id,
                fieldId: project.field.id,
                date: today,
              });

              console.log(`Issue #${issueNumber} Target Date → ${today}`);
            }
