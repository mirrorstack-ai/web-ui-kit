name: Feature Request
description: Suggest a new component or feature
title: "feat: "
labels: ["feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want?
      placeholder: A clear description of the feature
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered other approaches?
    validations:
      required: false
